name: Telegram Command Listener

# Runs every 5 minutes (GitHub's minimum cron interval) to check
# for /scan commands and dispatch the scanner workflow on demand.

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  listen:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to git-push the updated tg_offset.json

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Poll Telegram for commands
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID:   ${{ secrets.TG_CHAT_ID }}
          GH_PAT:       ${{ secrets.GH_PAT }}
          GH_REPO:      ${{ github.repository }}
          GH_BRANCH:    ${{ github.ref_name }}
        run: python telegram_listener.py

      - name: Persist update offset
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin ${{ github.ref_name }} || true
          git add tg_offset.json || true
          git diff --staged --quiet || git commit -m "chore: update telegram offset [skip ci]"
          git push || true
