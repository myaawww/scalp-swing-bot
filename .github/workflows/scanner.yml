name: Scalp Swing Scanner

on:
  schedule:
    # Runs every 15 minutes — aligns with 15m candle close
    - cron: "*/15 * * * *"
  workflow_dispatch:   # allows manual run from GitHub Actions UI

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # needed to commit state.json back

    steps:
      # ── 1. Checkout repo (including state.json if it exists) ──
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. Set up Python ──────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # ── 3. Install dependencies ───────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 4. Run scanner ────────────────────────────────────────
      - name: Run signal scanner
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID:   ${{ secrets.TG_CHAT_ID }}
        run: python signal_engine.py

      # ── 5. Commit updated state.json (cooldown persistence) ───
      - name: Persist cooldown state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json || true
          git diff --staged --quiet || git commit -m "chore: update scanner state [skip ci]"
          git push || true
